<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Class: Professions & A/AN</title>
    <style>
        :root {
            --primary: #ff7675;
            --secondary: #0984e3;
            --success: #00b894;
            --warning: #fdcb6e;
            --bg: #dfe6e9;
            --card-bg: #ffffff;
            --text: #2d3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); font-size: 2rem; }
        h2 { color: var(--secondary); margin-bottom: 1rem; font-size: 1.5rem; }

        /* Navegación por fases */
        .nav-phases {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .phase-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            background: #b2bec3;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .phase-btn.active { background: var(--secondary); transform: scale(1.05); }

        .section {
            display: none;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .section.active { display: block; }

        /* --- PRE: MEMORY GAME --- */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 1rem auto;
            max-width: 500px;
        }

        .mem-card {
            aspect-ratio: 1;
            background: var(--secondary);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            cursor: pointer;
            color: transparent;
            transition: all 0.3s;
            user-select: none;
        }

        .mem-card.flipped {
            background: white;
            border: 3px solid var(--primary);
            color: var(--text);
            transform: rotateY(180deg);
        }
        .mem-card.matched {
            background: var(--success);
            border: 3px solid var(--success);
            color: white;
            cursor: default;
        }

        /* --- DURING: GRAMMAR & SENTENCES --- */
        .grammar-box {
            background: #f1f2f6;
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            font-size: 1.2rem;
        }
        .highlight-a { color: var(--secondary); font-weight: bold; font-size: 1.5rem; }
        .highlight-an { color: var(--primary); font-weight: bold; font-size: 1.5rem; }
        .highlight-letter { color: var(--success); font-weight: bold; font-size: 1.5rem; text-decoration: underline; }

        .sentence-builder {
            font-size: 1.5rem;
            margin: 2rem 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .word-badge {
            background: #dfe6e9;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .article-chooser button {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 0.5rem 1rem;
            margin: 0 5px;
            border: 2px solid;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            transition: transform 0.2s;
        }
        .article-chooser button:hover { transform: scale(1.1); }
        #btn-a { color: var(--secondary); border-color: var(--secondary); }
        #btn-an { color: var(--primary); border-color: var(--primary); }

        .speak-btn {
            background: var(--warning);
            color: var(--text);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }

        /* --- POST: A OR AN GAME --- */
        .score-board {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--secondary);
            margin-bottom: 1rem;
        }

        .post-profession {
            font-size: 3rem;
            font-weight: bold;
            margin: 2rem 0;
            color: var(--text);
            padding: 1rem;
            background: #f1f2f6;
            border-radius: 10px;
        }

        .post-buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .post-btn {
            width: 120px;
            height: 120px;
            font-size: 3rem;
            font-weight: bold;
            border: 4px solid;
            border-radius: 20px;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
        }
        .post-btn:hover { transform: translateY(-5px); }
        #post-a { color: var(--secondary); border-color: var(--secondary); }
        #post-an { color: var(--primary); border-color: var(--primary); }

        .feedback {
            margin-top: 1.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            height: 30px;
        }

    </style>
</head>
<body>

    <header>
        <h1>Professions & A/AN</h1>
        <p>Interactive Lesson Plan</p>
    </header>

    <div class="nav-phases">
        <button class="phase-btn active" onclick="showSection('pre', this)">1. Pre (Memory Game)</button>
        <button class="phase-btn" onclick="showSection('during', this)">2. During (A/AN Rules)</button>
        <button class="phase-btn" onclick="showSection('post', this)">3. Post (A or An?)</button>
    </div>

    <!-- SECCIÓN PRE -->
    <div id="pre" class="section active">
        <h2>🧠 Memory Game: Professions</h2>
        <p>Find the pairs! When you match, say the profession out loud.</p>
        <div class="memory-grid" id="memoryGrid"></div>
    </div>

    <!-- SECCIÓN DURING -->
    <div id="during" class="section">
        <h2>📝 Grammar: A vs AN</h2>
        <div class="grammar-box">
            <p>We use <span class="highlight-a">a</span> before a <span class="highlight-letter">consonant sound</span>.</p>
            <p>We use <span class="highlight-an">an</span> before a <span class="highlight-letter">vowel sound</span>.</p>
        </div>

        <div class="sentence-builder">
            <span class="word-badge">Marina</span>
            <span class="word-badge">is</span>
            <span class="article-chooser">
                <button id="btn-a" onclick="chooseArticle('a')">a</button>
                <button id="btn-an" onclick="chooseArticle('an')">an</button>
            </span>
            <span class="word-badge">bus driver.</span>
        </div>

        <button class="speak-btn" onclick="speakSentence()">🔊 Read Sentence</button>

        <div class="feedback" id="duringFeedback"></div>
    </div>

    <!-- SECCIÓN POST -->
    <div id="post" class="section">
        <h2>🎮 Game: A or An?</h2>
        <div class="score-board">Score: <span id="score">0</span></div>
        
        <div class="post-profession" id="postProfession">nurse</div>
        
        <div class="post-buttons">
            <button class="post-btn" id="post-a" onclick="checkPostAnswer('a')">a</button>
            <button class="post-btn" id="post-an" onclick="checkPostAnswer('an')">an</button>
        </div>

        <div class="feedback" id="postFeedback"></div>
    </div>

    <script>
        // --- Navegación entre fases ---
        function showSection(sectionId, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            btn.classList.add('active');
        }

        // --- Text to Speech (Voz en Inglés) ---
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // --- PRE: Memory Game Logic ---
        const professions = ['👨‍⚕️', '🚌', '👩‍🔧', '👨‍🏫', '👩‍🎨', '🧑‍🚀'];
        let cards = [...professions, ...professions];
        cards = cards.sort(() => 0.5 - Math.random());
        let flippedCards = [];
        let matchedPairs = 0;

        const memoryGrid = document.getElementById('memoryGrid');

        function createMemoryGame() {
            memoryGrid.innerHTML = '';
            matchedPairs = 0;
            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.classList.add('mem-card');
                card.dataset.emoji = emoji;
                card.dataset.index = index;
                
                // Mapear emoji a palabra
                let word = "";
                if(emoji === '👨‍⚕️') word = "nurse";
                if(emoji === '🚌') word = "bus driver";
                if(emoji === '👩‍🔧') word = "engineer";
                if(emoji === '👨‍🏫') word = "teacher";
                if(emoji === '👩‍🎨') word = "artist";
                if(emoji === '🧑‍🚀') word = "astronaut";
                
                card.dataset.word = word;
                card.innerText = emoji; // Oculto por CSS hasta hacer clic
                
                card.addEventListener('click', () => flipCard(card));
                memoryGrid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (card.classList.contains('flipped') || card.classList.contains('matched') || flippedCards.length === 2) return;

            card.classList.add('flipped');
            speak(card.dataset.word); // Pronuncia la palabra al voltear
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                setTimeout(checkMatch, 800);
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            if (card1.dataset.emoji === card2.dataset.emoji) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                if (matchedPairs === professions.length) {
                    setTimeout(() => alert("Great job! You found all pairs!"), 300);
                }
            } else {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
            }
            flippedCards = [];
        }

        createMemoryGame();

        // --- DURING: Sentence Builder Logic ---
        let currentArticle = null;
        const duringFeedback = document.getElementById('duringFeedback');

        function chooseArticle(article) {
            currentArticle = article;
            duringFeedback.innerText = `You chose: ${article}`;
            duringFeedback.style.color = "#636e72";
        }

        function speakSentence() {
            if (!currentArticle) {
                duringFeedback.innerText = "Please choose 'a' or 'an' first!";
                duringFeedback.style.color = "red";
                return;
            }
            
            // Validación: "bus driver" empieza con consonante, debe ser "a"
            if (currentArticle === 'a') {
                duringFeedback.innerText = "✅ Correct! 'bus driver' starts with a consonant sound.";
                duringFeedback.style.color = "var(--success)";
                speak("Marina is a bus driver.");
            } else {
                duringFeedback.innerText = "❌ Oops! We use 'a' before 'bus driver'.";
                duringFeedback.style.color = "var(--primary)";
            }
        }

        // --- POST: A or An? Game Logic ---
        const postWords = ["nurse", "bus driver", "engineer", "teacher", "actor", "artist", "doctor", "astronaut", "electrician"];
        let currentWord = "";
        let score = 0;
        
        const postProfessionEl = document.getElementById('postProfession');
        const postFeedbackEl = document.getElementById('postFeedback');
        const scoreEl = document.getElementById('score');

        function nextPostWord() {
            currentWord = postWords[Math.floor(Math.random() * postWords.length)];
            postProfessionEl.innerText = currentWord;
            postFeedbackEl.innerText = "";
            speak(currentWord);
        }

        function checkPostAnswer(answer) {
            const firstLetter = currentWord[0].toLowerCase();
            const vowels = ['a', 'e', 'i', 'o', 'u'];
            const correctAnswer = vowels.includes(firstLetter) ? 'an' : 'a';

            if (answer === correctAnswer) {
                postFeedbackEl.innerText = "✅ Correct!";
                postFeedbackEl.style.color = "var(--success)";
                score += 10;
            } else {
                postFeedbackEl.innerText = `❌ Oops! It's "${correctAnswer} ${currentWord}".`;
                postFeedbackEl.style.color = "var(--primary)";
                score = Math.max(0, score - 5);
            }
            
            scoreEl.innerText = score;
            speak(`${correctAnswer} ${currentWord}`);
            
            setTimeout(nextPostWord, 1500);
        }

        // Iniciar el juego Post automáticamente al cargar por si el profesor salta directo ahí
        nextPostWord();

    </script>
</body>
</html>
